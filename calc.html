<!DOCTYPE html>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
:root {
  /* ===== Lucky7 ERP 디자인 시스템 (라이트) ===== */
  --bg:#fff; --bg-sb:#f7f6f3; --bg-h:#efefee; --bg-a:#e9e9e7; --bg-c:#fff; --bg-i:#fff;
  --tx:#37352f; --tx2:#787774; --tx3:#acaba8; --tx4:#acaba8;
  --br:#e9e9e7; --br2:#d3d1cb;
  --ac:#a87a1e; --ac-bg:#fbf3df; --ac-strong:#8a6416; --ac-bord:rgba(168,122,30,.35);
  --gr:#0f7b6c; --gr-bg:#edf3ec; --ok:#0f7b6c; --ok-bg:#edf3ec;
  --warn:#b5701a; --info:#a87a1e;
  --re:#e03e3e; --re-bg:#fbe4e4; --ye:#cb912f; --ye-bg:#fdf3d0; --pu:#6940a5; --pu-bg:#f4f0fb;
  --r-sm:4px; --r-md:8px; --r-lg:12px; --r-full:9999px;
  --e1:0 1px 2px rgba(15,15,15,.07),0 0 0 1px rgba(15,15,15,.04);
  --e2:0 2px 4px rgba(15,15,15,.05),0 8px 24px rgba(15,15,15,.07),0 0 0 1px rgba(15,15,15,.04);
  --e3:0 12px 32px rgba(15,15,15,.16),0 0 0 1px rgba(15,15,15,.06);
  --ease:cubic-bezier(0.16,1,0.3,1);
  /* ===== 별칭 (기존 컴포넌트 호환) ===== */
  --surface:var(--bg-c); --surface-2:var(--bg-i); --surface-3:var(--bg-a);
  --surface-hover:var(--bg-h); --surface-active:var(--bg-a); --hairline:var(--br);
  --border:var(--br); --border-strong:var(--br2);
  --text:var(--tx); --text-secondary:var(--tx2); --text-tertiary:var(--tx3);
  --accent:var(--ac); --accent-2:var(--ac-strong); --accent-soft:var(--ac-bg); --grad:var(--ac);
  --success:var(--gr); --success-soft:var(--gr-bg);
  --warning:var(--warn); --warning-soft:var(--ye-bg);
  --danger:var(--re); --danger-soft:var(--re-bg);
  --shadow:var(--e2); --shadow-lg:var(--e3); --shadow-card:var(--e2); --shadow-float:var(--e3);
  --surface-glass:var(--bg-c); --surface-panel-end:var(--bg-c); --surface-card-end:var(--bg-c);
  --bg-glow-a:transparent; --bg-glow-b:transparent; --ring:var(--ac-bord); --detail-tint:transparent;
}
[data-theme=dark]{
  --bg:#0e0e0e; --bg-sb:#131313; --bg-h:#1c1c1c; --bg-a:#232323; --bg-c:#161616; --bg-i:#1a1a1a;
  --tx:#e6e5e2; --tx2:#989792; --tx3:#5f5e5a; --tx4:#5f5e5a;
  --br:#232322; --br2:#2f2f2d;
  --ac:#c2a04a; --ac-bg:rgba(194,160,74,.13); --ac-strong:#d4b566; --ac-bord:rgba(194,160,74,.40);
  --gr:#4d9a8a; --gr-bg:rgba(77,154,138,.12); --ok:#4d9a8a; --ok-bg:rgba(77,154,138,.12);
  --warn:#d9943a; --info:#c2a04a;
  --re:#c46a6a; --re-bg:rgba(196,106,106,.12); --ye:#c79c4b; --ye-bg:rgba(199,156,75,.12); --pu:#9a7dc4; --pu-bg:rgba(154,125,196,.12);
  --e1:0 1px 2px rgba(0,0,0,.30),0 0 0 1px rgba(255,255,255,.04);
  --e2:0 2px 4px rgba(0,0,0,.35),0 8px 24px rgba(0,0,0,.30),0 0 0 1px rgba(255,255,255,.06);
  --e3:0 12px 32px rgba(0,0,0,.50),0 0 0 1px rgba(255,255,255,.08);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Pretendard", system-ui, sans-serif;
  background: var(--bg); color: var(--text); margin: 0; padding: 0;
  line-height: 1.5; font-size: 16px; letter-spacing: -0.01em;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
}
body { padding: 18px 14px 56px; min-height: 100vh; font-size: 15px; background: var(--bg); }
.container { max-width: 840px; margin: 0 auto; }
h1 { font-size: 25px; font-weight: 700; letter-spacing: -0.025em; margin: 0 0 4px; }
h2 { font-size: 17px; font-weight: 700; margin: 26px 0 5px; letter-spacing: -0.02em; position:relative; padding-left:13px; }
h2::before { content:''; position:absolute; left:0; top:0.16em; height:0.84em; width:4px; border-radius:2px; background:var(--grad); }
h3 { font-size: 11px; font-weight: 600; margin: 16px 0 7px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.07em; }
.subtitle { color: var(--text-secondary); font-size: 14px; margin: 0 0 8px; line-height: 1.45; }
.demo-badge { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600; color:var(--warning); background:var(--warning-soft); padding:4px 10px; border-radius:999px; }
.muted { color: var(--text-secondary); font-size: 13px; }
.tiny { color: var(--text-tertiary); font-size: 12px; }
.bignum { font-size: 23px; font-weight: 700; letter-spacing: -0.02em; }
.bignum small { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-left: 2px; }
.pos { color: var(--success); } .neg { color: var(--danger); } .neu { color: var(--text-secondary); }
.chip { display:inline-block; font-size:12px; font-weight:600; padding:3px 9px; border-radius:999px; background:var(--surface-3); color:var(--text-secondary); }
.btn { border:none; border-radius:11px; padding:10px 16px; font-size:15px; font-weight:600; cursor:pointer; font-family:inherit; transition:transform .12s var(--ease), filter .15s; }
.btn:active { transform:scale(.97); }
.btn:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
.btn-primary:active { filter:brightness(.92); }
.btn-primary { background:var(--grad); color:#fff; }
.btn-ghost { background:var(--surface-3); color:var(--text); }
.btn-sm { padding:7px 12px; font-size:13px; border-radius:10px; }
.btn-danger { background:var(--danger-soft); color:var(--danger); }
.input, select.input { width:100%; background:var(--surface-2); border:1px solid var(--border); border-radius:10px; padding:8px 11px; color:var(--text); font-size:16px; font-family:inherit; outline:none; transition:border-color .12s, box-shadow .12s; }
.input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
.note { background:var(--accent-soft); border:1px solid var(--ac-bord); border-radius:12px; padding:11px 13px; font-size:13px; color:var(--text-secondary); margin:8px 0 14px; line-height:1.55; }

.lang-toggle { display:flex; align-items:center; gap:10px; margin:14px 0 20px; }
.seg-group { display:inline-flex; background:var(--surface-2); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.seg { border:none; background:transparent; color:var(--text-secondary); padding:7px 16px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; }
.seg.active { background:var(--accent); color:#fff; }

.std-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(228px,1fr)); gap:10px; align-items:stretch; }
.std-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px; display:flex; flex-direction:column; gap:9px; transition:border-color .12s, transform .12s; box-shadow:var(--shadow); }
.std-card:hover { border-color:var(--border-strong); }
.std-card.editing { border-color:var(--accent); }
.std-client { font-size:18px; font-weight:700; line-height:1.15; }
.std-pc { font-size:12px; color:var(--text-tertiary); font-weight:600; margin-top:2px; }
.std-chips { display:flex; flex-wrap:wrap; gap:5px; }
.map-list { display:flex; flex-direction:column; border-top:1px solid var(--border); margin-top:2px; }
.map-row { display:flex; justify-content:space-between; align-items:center; padding:7px 0; border-bottom:1px solid var(--border); font-size:14px; gap:8px; }
.map-row:last-child { border-bottom:none; }
.map-row .mname { color:var(--text-secondary); }
.map-row .mval { font-weight:700; white-space:nowrap; }
.map-row .mval small { font-size:11px; color:var(--text-tertiary); margin-left:1px; }
.map-empty { font-size:12px; color:var(--text-tertiary); padding:7px 0; }
.std-add { display:flex; align-items:center; justify-content:center; min-height:108px; border:1.5px dashed var(--border-strong); border-radius:10px; background:transparent; color:var(--text-secondary); font-size:14px; font-weight:600; cursor:pointer; transition:border-color .12s, color .12s; }
.std-add:hover { border-color:var(--accent); color:var(--text); }
.std-add:active { opacity:.6; }

.edit-block { display:flex; flex-direction:column; gap:9px; }
.f-row { display:flex; align-items:center; justify-content:space-between; gap:8px; }
.f-row > label { font-size:12px; color:var(--text-tertiary); font-weight:600; }
.stepper { display:flex; align-items:center; background:var(--surface-2); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.stepper button { width:32px; height:32px; border:none; background:transparent; color:var(--text); font-size:18px; font-weight:600; cursor:pointer; }
.stepper button:active { background:var(--surface-3); }
.stepper .val { min-width:42px; text-align:center; font-size:15px; font-weight:700; }
.stepper .step-input { flex:1; min-width:0; width:100%; text-align:center; border:none; background:transparent; color:var(--text); font-size:15px; font-weight:700; outline:none; -moz-appearance:textfield; }
.stepper .step-input::-webkit-outer-spin-button, .stepper .step-input::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
.map-edit-block { display:flex; flex-direction:column; gap:5px; padding:8px; background:var(--surface-2); border:1px solid var(--border); border-radius:10px; }
.map-edit-block .input { padding:7px 9px; font-size:13px; background:var(--surface); }
.map-edit-row2 { display:grid; grid-template-columns:1fr 36px; gap:6px; }
.map-target { text-align:right; }
.map-x { width:36px; height:34px; border:none; border-radius:8px; background:var(--danger-soft); color:var(--danger); font-size:16px; cursor:pointer; }
.add-map { background:transparent; border:1px dashed var(--border-strong); color:var(--text-secondary); border-radius:8px; padding:7px; font-size:13px; font-weight:600; cursor:pointer; }

.dash-toolbar { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:12px; flex-wrap:wrap; }
.emp-overview { display:flex; flex-direction:column; gap:5px; margin-bottom:14px; }
.emp-row { display:grid; grid-template-columns:1fr 96px auto; align-items:center; gap:12px; padding:10px 13px; background:var(--surface); border:1px solid var(--border); border-radius:12px; cursor:pointer; transition:border-color .12s, background .12s; }
.emp-row:hover { border-color:var(--border-strong); }
.emp-row.selected { border-color:var(--accent); background:var(--accent-soft); }
.emp-name { font-weight:600; font-size:15px; }
.emp-mini { width:96px; }
@media (max-width:480px){ .emp-row{ grid-template-columns:1fr auto; } .emp-mini{ display:none; } }

.pay-strip { display:flex; flex-wrap:wrap; gap:8px; margin:6px 0 4px; }
.pay-box { flex:1; min-width:88px; background:var(--surface-2); border:1px solid var(--border); border-radius:11px; padding:9px 11px; }
.pay-box .plabel { font-size:11px; color:var(--text-tertiary); font-weight:600; }
.pay-box .pval { font-size:16px; font-weight:700; margin-top:2px; }

.scroll-x { overflow-x:auto; -webkit-overflow-scrolling:touch; border:1px solid var(--br); border-radius:10px; }
table.tbl { width:100%; border-collapse:collapse; font-size:12px; min-width:0; table-layout:fixed; }
table.tbl th { text-align:left; color:var(--tx3); font-size:10px; font-weight:600; padding:6px 8px; border-bottom:1px solid var(--br2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-transform:uppercase; letter-spacing:.03em; }
table.tbl td { padding:6px 8px; border-bottom:1px solid var(--br); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-variant-numeric:tabular-nums; }
table.tbl td.num, table.tbl th.num { text-align:right; }
table.tbl tr:last-child td { border-bottom:none; }
table.tbl tbody tr { transition:background .1s; }
table.tbl tbody tr:hover { background:var(--surface-2); }
.v-pass { color:var(--success); font-weight:600; }
.v-under { color:var(--warning); font-weight:600; }
.v-big { color:var(--danger); font-weight:700; }
.v-skip { color:var(--text-tertiary); }

.emp-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:15px; }
.emp-head { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:10px; }
.bar { height:6px; border-radius:3px; background:var(--surface-3); overflow:hidden; margin:10px 0 14px; }
.bar > i { display:block; height:100%; border-radius:3px; }
.staff-table { background:var(--surface); border:1px solid var(--border-strong); border-radius:12px; overflow:hidden; max-width:540px; box-shadow:var(--shadow); }
.staff-head, .staff-line { display:grid; grid-template-columns:1fr 78px 132px 26px; gap:8px; align-items:center; }
.staff-head { padding:7px 14px; background:var(--bg-a); border-bottom:1px solid var(--br2); }
.staff-head span { font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--tx2); font-weight:700; padding:0 7px; }
.staff-head span.h-rate { text-align:right; }
.staff-line { padding:4px 14px; border-bottom:1px solid var(--br2); transition:background .1s; }
.staff-line:last-of-type { border-bottom:none; }
.staff-line:hover { background:var(--bg-h); }
.staff-line .input { background:transparent; border:1px solid transparent; border-radius:7px; padding:5px 7px; font-size:14px; box-shadow:none; }
.staff-line .s-name { font-weight:600; color:var(--tx); }
.staff-line .s-rate, .staff-line .s-date { font-variant-numeric:tabular-nums; color:var(--tx); }
.staff-line .input:hover { background:var(--surface-2); border-color:var(--border); }
.staff-line .input:focus { background:var(--surface-2); border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-soft); }
.staff-line .s-rate { text-align:right; }
.staff-del { width:30px; height:30px; border:none; border-radius:8px; background:transparent; color:var(--text-tertiary); font-size:17px; line-height:1; cursor:pointer; transition:background .12s, color .12s; }
.staff-del:hover { background:var(--danger-soft); color:var(--danger); }
.staff-add { padding:11px 14px; text-align:center; color:var(--accent); font-size:14px; font-weight:600; cursor:pointer; transition:background .12s; }
.staff-add:hover { background:var(--surface-2); }
@media (max-width:560px){
  .staff-table { max-width:none; }
  .staff-head { display:none; }
  .staff-line { grid-template-columns:1fr 1fr 30px; grid-template-areas:'name name name' 'rate date del'; row-gap:6px; padding:10px 12px; }
  .staff-line .s-name{ grid-area:name; } .staff-line .s-rate{ grid-area:rate; text-align:left; } .staff-line .s-date{ grid-area:date; } .staff-del{ grid-area:del; justify-self:end; }
  .staff-line .input { background:var(--surface-2); border-color:var(--border); }
}
.calc-box { background:var(--surface-2); border:1px solid var(--border); border-radius:13px; padding:13px; margin:4px 0 12px; }
.calc-title { font-size:12px; font-weight:600; color:var(--text-secondary); margin-bottom:10px; }
.cmp-row { display:grid; grid-template-columns:60px 1fr auto; align-items:center; gap:10px; margin-bottom:7px; }
.cmp-label { font-size:12px; color:var(--text-tertiary); font-weight:600; }
.cmp-bar { height:13px; border-radius:7px; background:var(--surface-3); overflow:hidden; }
.cmp-bar > i { display:block; height:100%; border-radius:7px; transition:width .4s var(--ease); }
.cmp-val { font-size:13px; font-weight:700; white-space:nowrap; }
.calc-flow { margin-top:11px; padding-top:11px; border-top:1px solid var(--border); }
.calc-line { display:flex; align-items:baseline; justify-content:space-between; gap:10px; padding:3px 0; }
.calc-line .calc-eq { font-size:13px; color:var(--text-secondary); }
.calc-line b { font-weight:700; }
.bar-mk { position:relative; height:8px; border-radius:4px; background:var(--surface-3); }
.bar-mk > i { display:block; height:100%; border-radius:4px; transition:width .4s var(--ease); }
.bar-mk > .mk { position:absolute; top:-2px; bottom:-2px; width:2px; background:var(--text-secondary); border-radius:1px; }
.scroll-x::-webkit-scrollbar { height:6px; }
.scroll-x::-webkit-scrollbar-thumb { background:var(--surface-3); border-radius:3px; }
.scroll-x::-webkit-scrollbar-track { background:transparent; }
.emp-row:focus-visible, .seg:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
.dash-top { display:flex; gap:8px; align-items:center; margin-bottom:12px; }
.dash-top .input { flex:1; }
.glance { position:relative; background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; transition:border-color .14s, box-shadow .14s; box-shadow:var(--shadow); }
.glance::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--strip,var(--border-strong)); }
.glance:hover { border-color:var(--border-strong); }
.glance.open { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent), 0 10px 30px var(--accent-soft); }
.glance-main { padding:14px 16px 14px 18px; cursor:pointer; }
.glance-top { display:flex; align-items:center; justify-content:space-between; gap:10px; }
.glance-left { display:flex; align-items:center; gap:10px; min-width:0; }
.avatar { width:34px; height:34px; border-radius:10px; flex:0 0 auto; display:inline-flex; align-items:center; justify-content:center; font-size:13px; font-weight:800; letter-spacing:-.02em; }
.glance-name { font-size:16px; font-weight:600; letter-spacing:-.01em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.glance-perf { font-size:14px; font-weight:700; white-space:nowrap; }
.glance-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.gs-label { font-size:11px; color:var(--text-tertiary); font-weight:600; margin-bottom:2px; }
.gs-val { font-size:15px; font-weight:700; letter-spacing:-.01em; }
.glance-detail { padding:2px 16px 16px 18px; border-top:1px solid var(--border); }
@media (prefers-reduced-motion: reduce){ * { transition:none !important; animation:none !important; } }

/* 다듬기 */
.topbar { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:6px; }
.topbar-text { min-width:0; }
.lang-seg { flex:0 0 auto; }
.lang-seg .seg { padding:6px 13px; }
.helper { font-size:12.5px; color:var(--text-tertiary); line-height:1.55; margin:2px 0 14px; }
.helper b { color:var(--text-secondary); font-weight:600; }
.gs-val, .glance-perf, .cmp-val, .bignum, .calc-line b, .map-row .mval, table.tbl td, .ts-val, .pval { font-variant-numeric:tabular-nums; }
.team-summary { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:12px; }
.team-stat { background:var(--surface-2); border:1px solid var(--border); border-radius:12px; padding:10px 12px; }
.team-stat .ts-label { font-size:10px; text-transform:uppercase; letter-spacing:.04em; color:var(--text-tertiary); font-weight:600; }
.team-stat .ts-val { font-size:17px; font-weight:700; margin-top:2px; letter-spacing:-.01em; }
.glance-right { display:flex; align-items:center; }
.glance-chev { color:var(--text-tertiary); font-size:13px; margin-left:9px; transition:transform .2s var(--ease); }
.glance.open .glance-chev { transform:rotate(90deg); }
.spark { display:flex; align-items:flex-end; gap:4px; height:30px; margin:11px 0 13px; position:relative; }
.spark::before { content:''; position:absolute; left:0; right:0; bottom:62.5%; border-top:1px dashed var(--border-strong); opacity:.7; }
.spark-bar { width:9px; flex:0 0 9px; border-radius:3px 3px 0 0; transform-origin:bottom; animation:growUp .5s var(--ease) both; }
.spark-bar.latest { box-shadow:0 0 0 1px var(--bg), 0 -3px 8px -2px currentColor; }
@keyframes growUp { from { transform:scaleY(0); } to { transform:scaleY(1); } }
.vp { display:inline-block; padding:2px 9px; border-radius:999px; font-size:11px; font-weight:700; }
.vp.v-pass { background:var(--success-soft); color:var(--success); }
.vp.v-under { background:var(--warning-soft); color:var(--warning); }
.vp.v-big { background:var(--danger-soft); color:var(--danger); }
.vp.v-skip { background:var(--surface-3); color:var(--text-tertiary); }
.ts-grad { background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent; }
.result-pill { display:inline-flex; align-items:center; padding:3px 12px; border-radius:999px; font-weight:800; font-size:18px; }
.result-pill.pos { background:var(--success-soft); color:var(--success); }
.result-pill.neg { background:var(--danger-soft); color:var(--danger); }
.glance-detail { animation:expandIn .22s var(--ease); }
@keyframes expandIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:none; } }
.std-card { cursor:pointer; position:relative; }
.std-edit-hint { position:absolute; top:13px; right:14px; font-size:13px; color:var(--text-tertiary); opacity:0; transition:opacity .12s; }
.std-card:hover .std-edit-hint { opacity:1; }
.empty { text-align:center; color:var(--text-tertiary); font-size:14px; padding:26px 16px; border:1px dashed var(--border-strong); border-radius:10px; }

/* 편집 모달 */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.55); backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; padding:16px; z-index:100; opacity:0; pointer-events:none; transition:opacity .2s; }
.modal-overlay.open { opacity:1; pointer-events:auto; }
.modal { background:var(--surface); border:1px solid var(--border-strong); border-radius:12px; width:100%; max-width:460px; max-height:88vh; display:flex; flex-direction:column; overflow:hidden; transform:translateY(10px) scale(.98); transition:transform .2s var(--ease); box-shadow:var(--shadow-lg); }
.modal-overlay.open .modal { transform:none; }
.modal-head { display:flex; align-items:center; justify-content:space-between; padding:15px 18px; border-bottom:1px solid var(--border); flex:0 0 auto; }
.modal-head h3 { margin:0; font-size:16px; font-weight:700; color:var(--text); text-transform:none; letter-spacing:-.01em; }
.modal-close { width:32px; height:32px; border:none; border-radius:9px; background:var(--surface-3); color:var(--text-secondary); font-size:19px; line-height:1; cursor:pointer; transition:background .12s; }
.modal-close:hover { background:var(--border-strong); color:var(--text); }
.modal-body { padding:14px 18px; overflow-y:auto; flex:1 1 auto; }
.modal-foot { display:flex; gap:8px; align-items:center; padding:12px 18px; border-top:1px solid var(--border); flex:0 0 auto; }
.field { margin-bottom:10px; }
.field .flabel { display:block; font-size:11.5px; color:var(--text-tertiary); font-weight:600; margin-bottom:4px; }
.form-grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.stepper-row { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:2px; }
.step-cell .stepper { width:100%; margin-top:0; }
.step-cell .stepper button { width:34px; height:34px; flex:0 0 auto; font-size:16px; }
.step-cell .stepper .val { flex:1; font-size:14px; }
.map-edit { display:grid; grid-template-columns:1fr 1fr 54px 74px 28px; gap:6px; align-items:center; margin-bottom:6px; }
.map-edit .input { padding:6px 8px; font-size:14px; }
.map-edit input[type=number] { -moz-appearance:textfield; }
.map-edit input[type=number]::-webkit-outer-spin-button, .map-edit input[type=number]::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
.map-edit .map-x { width:28px; height:32px; font-size:15px; }
.map-edit-head { display:grid; grid-template-columns:1fr 1fr 54px 74px 28px; gap:6px; margin-bottom:4px; }
.map-edit-head span { font-size:10px; color:var(--text-tertiary); font-weight:600; }
.mlv { color:var(--ac); font-weight:700; font-size:11px; background:var(--ac-bg); padding:1px 5px; border-radius:5px; }
@media (max-width:480px){
  .modal-overlay { align-items:flex-end; padding:0; }
  .modal { max-width:none; max-height:92vh; border-radius:12px 20px 0 0; border-bottom:none; transform:translateY(100%); }
  .modal-body { padding-bottom:20px; }
}


/* ============================================================
   v23 UI 리프레시: 레이아웃 / 밀도 / 카드 계층 정리
   ============================================================ */
:root {
  --bg-glow-a: transparent;
  --bg-glow-b: transparent;
  --surface-glass: var(--bg-c);
  --surface-hover: var(--bg-h);
  --surface-active: var(--bg-a);
  --surface-panel-end: var(--bg-c);
  --surface-card-end: var(--bg-c);
  --detail-tint: transparent;
  --hairline: var(--br);
  --ring: var(--ac-bord);
  --shadow-card: var(--e2);
  --shadow-float: var(--e3);
}
html { scroll-behavior:smooth; }
body {
  padding: 22px 16px 64px;
  background: var(--bg);
}
.container { max-width:1180px; }
.hero-card {
  position:relative;
  padding:18px 18px 16px;
  border:1px solid var(--border-strong);
  border-radius:12px;
  background:linear-gradient(180deg, var(--surface-glass), var(--surface));
  box-shadow:var(--shadow-float);
  overflow:hidden;
}
.hero-card::after {
  content:'';
  position:absolute;
  inset:auto -10% -42px 48%;
  height:90px;
  background:radial-gradient(circle, var(--accent-soft), transparent 70%);
  pointer-events:none;
}
.topbar { align-items:center; margin-bottom:10px; }
.eyebrow {
  display:inline-flex;
  margin-bottom:6px;
  color:var(--accent-2);
  font-size:11px;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:.08em;
}
h1 { font-size:clamp(27px, 4vw, 42px); line-height:1.02; margin-bottom:7px; }
.subtitle { max-width:720px; font-size:14.5px; margin-bottom:10px; }
.demo-badge { border:1px solid var(--warning-soft); }
.lang-seg { align-self:flex-start; position:relative; z-index:1; }
.seg-group { box-shadow:inset 0 0 0 1px var(--hairline); }
.seg { min-height:34px; }
.quick-nav {
  position:sticky;
  top:10px;
  z-index:20;
  display:flex;
  gap:7px;
  margin:10px 0 14px;
  padding:6px;
  background:var(--surface-glass);
  border:1px solid var(--border);
  border-radius:10px;
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  box-shadow:var(--shadow-card);
}
.quick-link {
  flex:1;
  min-height:36px;
  border:0;
  border-radius:11px;
  background:transparent;
  color:var(--text-secondary);
  font:700 13px/1 inherit;
  cursor:pointer;
  transition:background .14s var(--ease), color .14s var(--ease), transform .12s var(--ease);
}
.quick-link:hover { background:var(--surface-hover); color:var(--text); }
.quick-link:active { transform:scale(.98); background:var(--surface-active); }
.quick-link:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
.section-panel {
  scroll-margin-top:76px;
  margin-top:14px;
  padding:16px;
  border:1px solid var(--border);
  border-radius:12px;
  background:linear-gradient(180deg, var(--surface-glass), var(--surface-panel-end));
  box-shadow:var(--shadow-card);
}
.compact-panel { max-width:780px; }
.section-head {
  display:flex;
  justify-content:space-between;
  gap:12px;
  margin-bottom:12px;
}
.section-head h2 { margin:0 0 4px; }
.section-head .muted, .section-head .helper { margin:0; max-width:760px; }
h2 { font-size:18px; padding-left:14px; }
h2::before { height:1em; top:.13em; }
.std-grid { grid-template-columns:repeat(auto-fit, minmax(252px,1fr)); gap:12px; }
.std-card {
  min-height:188px;
  padding:15px;
  border-radius:10px;
  background:linear-gradient(180deg, var(--surface), var(--surface-glass));
  box-shadow:var(--shadow-card);
}
.std-card:hover { transform:translateY(-1px); box-shadow:var(--shadow-float); }
.std-client { padding-right:34px; font-size:19px; }
.std-pc { display:inline-flex; margin-top:5px; padding:2px 7px; border-radius:999px; background:var(--surface-2); color:var(--text-secondary); }
.std-chips { gap:6px; }
.chip { border:1px solid var(--hairline); background:var(--surface-2); }
.map-list { margin-top:auto; }
.map-row { min-height:34px; padding:8px 0; }
.map-row .mname { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.std-add { min-height:188px; background:var(--surface-glass); box-shadow:inset 0 0 0 1px var(--hairline); }
.staff-table { max-width:none; width:100%; border-radius:10px; }
.staff-head, .staff-line { grid-template-columns:1.25fr 110px 150px 32px; }
.staff-line { min-height:46px; }
.staff-add { border-top:1px solid var(--border); }
.team-summary { grid-template-columns:repeat(3,minmax(0,1fr)); gap:10px; }
.team-stat {
  min-height:72px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  background:linear-gradient(180deg, var(--surface-2), var(--surface));
  border-color:var(--border-strong);
}
.team-stat .ts-val { font-size:clamp(18px, 2.5vw, 24px); }
.dash-top {
  position:sticky;
  top:68px;
  z-index:10;
  padding:8px;
  margin:0 0 12px;
  border:1px solid var(--border);
  border-radius:10px;
  background:var(--surface-glass);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
}
.period-seg { flex:0 0 auto; }
.period-seg .seg { padding:7px 11px; }
.emp-overview { display:grid; grid-template-columns:repeat(auto-fit, minmax(320px,1fr)); gap:12px; }
.glance { border-radius:12px; background:linear-gradient(180deg, var(--surface), var(--surface-card-end)); }
.glance:hover { transform:translateY(-1px); box-shadow:var(--shadow-float); }
.glance-main { padding:15px 16px 15px 19px; }
.glance-meta { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
.glance-pending { opacity:.62; }
.meta-chip {
  display:inline-flex;
  align-items:center;
  gap:4px;
  padding:3px 8px;
  border-radius:999px;
  background:var(--surface-2);
  border:1px solid var(--hairline);
  color:var(--text-secondary);
  font-size:11px;
  font-weight:700;
}
.meta-chip.bad { color:var(--danger); background:var(--danger-soft); border-color:var(--danger-soft); }
.meta-chip.warn { color:var(--warning); background:var(--warning-soft); border-color:var(--warning-soft); }
.spark { height:34px; gap:5px; }
.spark-bar { flex:1 1 9px; min-width:7px; max-width:16px; }
.glance-stats { padding-top:10px; border-top:1px solid var(--hairline); }
.gs-label { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.gs-val { font-size:16px; }
.glance-detail { background:var(--detail-tint); }
.calc-box { background:linear-gradient(180deg, var(--surface-2), var(--surface)); border-color:var(--border-strong); }
.calc-line { min-height:28px; }
.result-pill { font-size:16px; }
.scroll-x { background:var(--surface); border-color:var(--border-strong); }
table.tbl { font-size:12.5px; }
table.tbl th { position:sticky; top:0; z-index:1; background:var(--surface-2); }
table.tbl td { vertical-align:middle; }
.input, select.input { min-height:38px; }
.btn { min-height:38px; }
.modal { border-radius:12px; }
.modal-head { background:var(--surface-2); }
.modal-body { scrollbar-width:thin; }
@media (min-width:980px){
  .section-panel { padding:18px; }
  .std-grid { grid-template-columns:repeat(3, minmax(0,1fr)); }
}
@media (max-width:760px){
  body { padding:12px 10px 42px; }
  .hero-card { padding:15px; border-radius:12px; }
  .topbar { align-items:flex-start; }
  .lang-seg { align-self:flex-start; }
  .quick-nav { top:6px; margin-bottom:10px; }
  .quick-link { font-size:12px; min-height:34px; }
  .section-panel { padding:12px; border-radius:10px; }
  .team-summary { grid-template-columns:1fr; }
  .dash-top { top:56px; }
  .period-seg { width:100%; display:flex; }
  .period-seg .seg { flex:1; }
  .emp-overview { grid-template-columns:1fr; }
}
@media (max-width:480px){
  .topbar { flex-direction:column; }
  .lang-seg { width:100%; }
  .lang-seg .seg { flex:1; }
  .quick-nav { overflow-x:auto; }
  .quick-link { flex:0 0 auto; padding:0 13px; }
  .std-grid { grid-template-columns:1fr; }
  .glance-stats { grid-template-columns:1fr; }
  .dash-top .btn { width:100%; }
}

/* ===== 노션식 사이드바 셸 ===== */
html { scroll-behavior:smooth; }
body { padding:0; background:var(--bg); }
.app-shell { display:flex; min-height:100vh; }
.sidebar { position:sticky; top:0; align-self:flex-start; height:100vh; width:236px; flex:0 0 236px; display:flex; flex-direction:column; gap:16px; padding:18px 8px; border-right:1px solid var(--br); background:var(--bg-sb); }
.sidebar .brand { padding:4px 12px 6px; }
.sidebar .eyebrow { display:inline-flex; margin:0 0 4px; color:var(--ac); font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; }
.sidebar .brand h1 { font-size:18px; line-height:1.15; margin:0; letter-spacing:-0.022em; color:var(--tx); }
.sidebar .subtitle { display:none; }

.nav-item { display:flex; align-items:center; gap:10px; width:100%; text-align:left; padding:7px 12px; margin:1px 0; border:0; border-radius:6px; background:transparent; color:var(--tx2); font:500 13px/1.4 inherit; cursor:pointer; transition:background var(--ease) .12s, color var(--ease) .12s; }
.nav-item:hover { background:var(--bg-h); color:var(--tx); }
.nav-item.active { background:var(--ac-bg); color:var(--ac-strong); font-weight:600; }
.nav-item.active .nav-ico { filter:none; opacity:1; }
.nav-ico { width:18px; text-align:center; font-size:14px; flex:0 0 auto; opacity:.85; }

.main { flex:1 1 auto; min-width:0; padding:26px 30px 64px; }
.section-panel { display:none; margin:0; padding:0; border:0; background:none; box-shadow:none; max-width:none; scroll-margin-top:0; }
.section-panel.active { display:block; animation:secIn .24s var(--ease); }
@keyframes secIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
.section-head { display:block; margin-bottom:18px; }

}
/* ===== 직원 상세: 월급 위기감 대시보드 ===== */
.udash { padding-top:2px; }
.ud-head { display:flex; gap:10px; flex-wrap:wrap; }
.ud-h-base, .ud-h-proj { flex:1 1 160px; min-width:150px; background:var(--bg-i); border:1px solid var(--br); border-radius:10px; padding:11px 13px; }
.ud-h-proj.neg { background:var(--re-bg); border-color:var(--re-bg); }
.ud-h-proj.pos { background:var(--gr-bg); border-color:var(--gr-bg); }
.ud-h-lbl { font-size:10px; text-transform:uppercase; letter-spacing:.05em; color:var(--tx3); font-weight:700; margin-bottom:5px; }
.ud-h-base-val { font-size:18px; font-weight:700; color:var(--tx); font-variant-numeric:tabular-nums; }

.ud-gauge-mark { position:absolute; top:50%; width:13px; height:13px; border-radius:50%; transform:translate(-50%,-50%); border:2px solid var(--bg-c); box-shadow:0 0 0 1px var(--br); }
.ud-gauge-mark.neg { background:var(--re); } .ud-gauge-mark.pos { background:var(--gr); } .ud-gauge-mark.neu { background:var(--tx3); }
.ud-gauge-scale { display:flex; font-size:9.5px; color:var(--tx3); margin-top:6px; font-weight:600; }
.ud-msg { font-size:12.5px; font-weight:600; margin:9px 0 2px; padding:8px 11px; border-radius:8px; line-height:1.4; }

.ud-msg.pos { background:var(--gr-bg); color:var(--gr); }

.ud-list-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--tx2); margin:14px 0 7px; }
.ud-list { display:flex; flex-direction:column; gap:4px; }
.ud-row { display:flex; align-items:center; gap:10px; padding:7px 11px 7px 13px; background:var(--bg-c); border:1px solid var(--br); border-radius:8px; position:relative; overflow:hidden; }
.ud-row::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--c); }
.ud-date { font-size:12.5px; font-weight:700; color:var(--tx); min-width:42px; flex:0 0 auto; font-variant-numeric:tabular-nums; }
.ud-dead { color:var(--re); font-size:10px; font-weight:600; }

.ud-calc { flex:1; min-width:0; font-size:11.5px; color:var(--tx2); font-variant-numeric:tabular-nums; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.ud-delta.pos { color:var(--gr); } .ud-delta.neg { color:var(--re); } .ud-delta.neu { color:var(--tx3); }
.ud-net-row { display:flex; justify-content:space-between; align-items:center; padding:9px 13px; border-radius:10px; background:var(--ac-bg); border:1px solid var(--ac-bord); margin-bottom:8px; }
.ud-net-row.neg { background:var(--re-bg); border-color:var(--re-bg); }
.ud-net-row.pos { background:var(--gr-bg); border-color:var(--gr-bg); }

// 직원: name(=리포트의 booster와 일치), rate(월급), protectedUntil(보호 종료일), shift(참고)

// 기록은 '보고' 탭(또는 친구 Supabase 연동)으로 채워집니다. 초기 상태는 비어 있음 — 전원 '기록 대기'.

// ── Supabase 영구 저장 (서버 /api/calc-data 경유) + 실시간 동기화 ──
function setSyncStatus(state){
  let el=document.getElementById('sync-status');
  if(!el){ el=document.createElement('div'); el.id='sync-status'; el.style.cssText='position:fixed;right:14px;bottom:14px;z-index:99999;font-size:11.5px;font-weight:700;padding:6px 12px;border-radius:999px;letter-spacing:.02em;transition:.3s;pointer-events:none;backdrop-filter:blur(8px);'; document.body.appendChild(el); }
  if(state==='ok'){ el.textContent='✦ '+(lang==='en'?'Synced':'동기화됨'); el.style.background='rgba(46,180,110,.14)'; el.style.color='#3ec77f'; el.style.border='1px solid rgba(62,199,127,.28)'; }
  else { el.textContent='⚠ '+(lang==='en'?'Not saved — check setup':'저장 안 됨 — 설정 확인'); el.style.background='rgba(210,60,60,.16)'; el.style.color='#ff6b6b'; el.style.border='1px solid rgba(255,107,107,.32)'; }
}
async function _putData(key, value){
  try{
    const r=await fetch('/api/calc-data/'+key,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({value})});
    const j=await r.json().catch(()=>({}));
    if(!r.ok || j.error){ setSyncStatus('fail'); return null; }
    setSyncStatus('ok'); return j.updated_at||null;
  }catch(e){ setSyncStatus('fail'); return null; }
}
let _syncTs={clients:undefined, staff:undefined, reports:undefined, games:undefined};
// 서버에서 최신 데이터를 가져와 메모리 갱신. 비어있으면 현재값으로 시드. 변경되면 true 반환.
async function syncFromServer(){
  let changed=false, ok=true;
  try{
    const [rc,rs,rr,rg]=await Promise.all([fetch('/api/calc-data/clients'),fetch('/api/calc-data/staff'),fetch('/api/calc-data/reports'),fetch('/api/calc-data/games')]);
    const jc=await rc.json().catch(()=>({error:'parse'})), js=await rs.json().catch(()=>({error:'parse'})), jr=await rr.json().catch(()=>({error:'parse'})), jg=await rg.json().catch(()=>({error:'parse'}));
    if(!rc.ok||!rs.ok||!rr.ok||jc.error||js.error||jr.error){ ok=false; }
    else {
      if(jc.updated_at!==_syncTs.clients){ _syncTs.clients=jc.updated_at; if(jc.value&&jc.value.length!=null){ MOCK_CLIENTS=jc.value; } else { _syncTs.clients=await _putData('clients',MOCK_CLIENTS); } changed=true; }
      if(js.updated_at!==_syncTs.staff){ _syncTs.staff=js.updated_at; if(js.value&&js.value.length!=null){ MOCK_STAFF=js.value; } else { _syncTs.staff=await _putData('staff',MOCK_STAFF); } changed=true; }
      if(jr.updated_at!==_syncTs.reports){ _syncTs.reports=jr.updated_at; if(jr.value&&jr.value.length!=null){ MOCK_REPORTS=jr.value; } else { _syncTs.reports=await _putData('reports',MOCK_REPORTS); } changed=true; }
      if(rg.ok && !jg.error && jg.updated_at!==_syncTs.games){ _syncTs.games=jg.updated_at; if(jg.value&&jg.value.length!=null){ CUSTOM_GAMES=jg.value; rebuildGames(); } changed=true; }
    }
  }catch(e){ ok=false; }
  setSyncStatus(ok?'ok':'fail');
  return changed;
}
async function loadClients() {

}
async function saveClient(c) {
  const i = MOCK_CLIENTS.findIndex(x => x.id === c.id);
  if (i >= 0) MOCK_CLIENTS[i] = c; else MOCK_CLIENTS.push(c);
  const ts = await _putData('clients', MOCK_CLIENTS); if(ts)_syncTs.clients=ts;
}
async function removeClient(id) {
  MOCK_CLIENTS = MOCK_CLIENTS.filter(x => x.id !== id);
  const ts = await _putData('clients', MOCK_CLIENTS); if(ts)_syncTs.clients=ts;
}
async function loadReports() {

  return MOCK_REPORTS.slice();
}
async function saveReport(r) {
  MOCK_REPORTS.push(r);
  const _ts=await _putData('reports', MOCK_REPORTS); if(_ts)_syncTs.reports=_ts;   // 리포트도 Supabase에 영구 저장
  // Discord/카톡 전송: 기존 /api/report 파이프라인 사용 (→ Discord → 봇 → Supabase → /kakao)
  try {
    const typeMap={ checkin:'checkin', status:'hourly', checkout:'checkout' };
    const type=typeMap[r.tag]||'hourly';
    const enClass=(JOB_T[r.classJob]&&JOB_T[r.classJob].en)||r.classJob||'';
    const fields={
      clientNo:r.no, nickname:r.client, clientNoLabel:(r.no!=null?r.no+' ':'')+(r.client||''),

let adjId=null, adjMode='normal', adjPct=100;
function openAdjModal(id){
  if(!roleCan('editRecords')) return;
  const r=MOCK_REPORTS.find(x=>x.id===id); if(!r) return;
  adjId=id; adjMode=(r.adj&&r.adj.mode)||'normal'; adjPct=(r.adj&&r.adj.pct)||100;
  renderAdjModal(r);
}
function renderAdjModal(r){
  const o=document.getElementById('adj-modal'); if(!o) return;
  const timeLbl = (r.tag==='checkout') ? (r.start+'~'+r.end) : (r.start||'');
  const desc = adjMode==='rest' ? t('adjRestD') : adjMode==='manual' ? t('adjManualD') : t('adjNormalD');
  o.innerHTML=`<div class="modal" onclick="event.stopPropagation()">
    <div class="modal-head"><h3>${t('adjTitle')}</h3><button class="modal-close" onclick="closeAdjModal()" aria-label="close">×</button></div>
    <div class="modal-body">
      <div class="adj-ctx">${esc(r.booster)} · ${(r.date||'').slice(5)} · ${esc(timeLbl)}${r.map?(' · '+esc(r.map)):''}</div>
      <div class="adj-modes">
        <button class="adj-mode${adjMode==='normal'?' on':''}" onclick="setAdjMode('normal')">${t('adjNormal')}</button>
        <button class="adj-mode${adjMode==='rest'?' on':''}" onclick="setAdjMode('rest')">${t('adjRest')}</button>
        <button class="adj-mode${adjMode==='manual'?' on':''}" onclick="setAdjMode('manual')">${t('adjManual')}</button>
      </div>
      <div class="adj-desc">${desc}</div>
      ${adjMode==='manual'?`<div class="adj-pct-row">
        <input id="adj-pct" type="text" inputmode="numeric" maxlength="3" value="${adjPct}" oninput="adjPctIn(this)" class="adj-pct-input"><span class="adj-pct-unit">%</span>
        <span class="adj-pct-hint">${t('adjPctHint')} · ${MONTH_MIN}~${MONTH_MAX}%</span>
      </div>`:''}
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost btn-sm" onclick="closeAdjModal()">${t('cancel')}</button>
      <button class="btn btn-primary" style="flex:1;" onclick="commitAdj()">${t('save')}</button>
    </div>
  </div>`;
  o.classList.add('open'); document.body.style.overflow='hidden';
}
function setAdjMode(m){ adjMode=m; const r=MOCK_REPORTS.find(x=>x.id===adjId); if(r)renderAdjModal(r); }
function adjPctIn(el){ adjPct=el.value.replace(/[^0-9]/g,'').slice(0,3); }
function closeAdjModal(){ const o=document.getElementById('adj-modal'); if(o){o.classList.remove('open');o.innerHTML='';} document.body.style.overflow=''; adjId=null; }
function commitAdj(){ saveAdj(adjId, adjMode, adjPct); }
async function saveAdj(id, mode, pct){
  const r=MOCK_REPORTS.find(x=>x.id===id); if(!r){ closeAdjModal(); return; }
  if(mode==='normal'){ delete r.adj; }
  else if(mode==='rest'){ r.adj={ mode:'rest' }; }
  else { const v=Math.max(MONTH_MIN, Math.min(MONTH_MAX, Number(pct)||100)); r.adj={ mode:'manual', pct:v }; }
  const _ts=await _putData('reports', MOCK_REPORTS); if(_ts)_syncTs.reports=_ts;
  closeAdjModal();
  if(typeof renderDashboard==='function') renderDashboard();
  if(typeof renderLeaderboard==='function') renderLeaderboard();
  showToast(t('adjSaved'));
}

function hashHue(s){ let h=0; for(const ch of String(s||'?')) h=(h*31+ch.charCodeAt(0))%360; return h; }

/* ============================================================
   계산 로직
   ============================================================ */
function toMin(hhmm){ const [h,m]=String(hhmm).split(':').map(Number); return h*60+(m||0); }
function ovMin(s,e,bs,be){ return Math.max(0, Math.min(e,be)-Math.max(s,bs)); }
// 근무시간(8/10/12)별 쉬는시간 — 8h만 다름
function workHoursOf(s){
  if(s && s.workHours) return Number(s.workHours);
  const m=String(s&&s.shift||'').match(/(\d+)\s*h/i);   // "주간 10h" → 10
  return m?Number(m[1]):12;
}
function breaksFor(wh){
  return Number(wh)===8
    ? [[900,960],[1380,1440],[420,480]]    // 8h: 15~16, 23~24, 07~08
    : [[900,960],[300,360]];               // 10/12h: 15~16, 05~06
}
function sessionHours(r, breaks){
  const S=toMin(r.start), E=toMin(r.end);
  if(!isFinite(S)||!isFinite(E)) return 0;
  let span=E-S; if(span<=0)span+=1440;            // 자정 넘김
  const BR = breaks || [[900,960],[300,360]];     // 기본(10/12h)
  let brk=0;                                       // 쉬는시간 (당일+다음날 양쪽 체크)
  for(const [bs,be] of BR){ brk+=ovMin(S,S+span,bs,be)+ovMin(S,S+span,bs+1440,be+1440); }
  const eff=span-brk;
  return eff>0?eff/60:0;
}
function gainedPct(r){ return (r.lvAfter-r.lvBefore)*100 + (r.expAfter-r.expBefore); }
// 작성 시각: createdAt(작성 시 기록) → 현황/체크아웃 시각 → id 타임스탬프
function pad2(n){ return String(n).padStart(2,'0'); }
function nowStamp(){ const d=new Date(); return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate())+' '+pad2(d.getHours())+':'+pad2(d.getMinutes()); }
function writtenAt(r){
  if(!r) return '';
  if(r.createdAt) return r.createdAt;
  const tm = (r.tag==='status') ? r.start : (r.tag==='checkout' ? r.end : null);
  if(r.date && tm) return r.date+' '+tm;
  const m=String(r.id||'').match(/^rpt-(\d+)/);
  if(m){ const d=new Date(Number(m[1])); return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate())+' '+pad2(d.getHours())+':'+pad2(d.getMinutes()); }
  return r.date||'';
}
function writtenShort(r){ const s=writtenAt(r); return s.length>=16 ? s.slice(5) : s; }   // "MM-DD HH:MM"
// 절대 UTC ms (리포트 id의 Date.now() 또는 숫자 createdAt) → 한국(+9)/자카르타(+7) 각각 표시
function reportMs(r){
  if(!r) return null;
  if(typeof r.createdAt==='number' && r.createdAt>1e12) return r.createdAt;
  const m=String(r.id||'').match(/^rpt-(\d+)/);
  if(m) return Number(m[1]);
  return null;
}
function fmtAt(ms, off){ const d=new Date(ms + off*3600*1000); return pad2(d.getUTCMonth()+1)+'-'+pad2(d.getUTCDate())+' '+pad2(d.getUTCHours())+':'+pad2(d.getUTCMinutes()); }
function dualTimeHtmlMs(ms, fallbackStr){
  if(ms!=null && ms>1e12){
    return `<span class="wt" onclick="toggleTz(event,this)" title="${t('tzToggle')}"><span class="wt-kr">🇰🇷 ${fmtAt(ms,9)}</span><span class="wt-id">🇮🇩 ${fmtAt(ms,7)}</span></span>`;
  }
  return `<span class="wt-plain">${esc(fallbackStr||'')}</span>`;
}
function toggleTz(e, el){ if(e){ e.stopPropagation(); } if(el) el.classList.toggle('show-id'); }
function dualTimeHtml(r){ return dualTimeHtmlMs(reportMs(r), writtenShort(r)); }
function isProtectedDate(startStr,dateStr){
  if(!startStr) return false;
  const diff=Math.floor((new Date(dateStr+'T00:00:00')-new Date(startStr+'T00:00:00'))/864e5);
  return diff>=0 && diff<PROTECTION_DAYS;
}
function isProtectedUntil(untilStr,dateStr){
  if(!untilStr) return false;
  return dateStr <= untilStr;          // 보호 종료일(포함) 이하면 보호중
}
function staffByName(staff,name){ return staff.find(s=>s.name===name)||null; }
function zoneKey(s){ s=(s||'').toLowerCase();
  if(s.includes('orc')) return 'orc';
  if(s.includes('ant')) return 'ant';
  if(s.includes('dragon')) return 'dragon';
  if(s.includes('blessed')||s.includes('ats')) return 'ats';
  if(s.includes('gludio')||s.includes('giran')||s.includes('desert')||s.includes('dessert')) return 'dgg';
  return s;
}
function findMap(clients,r){
  const c=clients.find(x=>x.name===r.client) || clients.find(x=>String(x.pc)===String(r.pc));
  if(!c||!c.maps) return null;
  const z=zoneKey(r.map); const lv=Number(r.lvAfter!=null?r.lvAfter:r.lv);
  const cand=c.maps.filter(m=>zoneKey(m.en||m.ko)===z);
  if(!cand.length) return null;
  // 레벨 없는 맵 = 와일드카드 (바로 사용)
  const wild=cand.find(m=>m.level==null||m.level==='');
  if(wild) return wild;
  // 레벨 있는 맵: 세션 레벨 이하 중 가장 높은 레벨(기준이 위 레벨로 이어짐). 없으면 가장 낮은 레벨.
  const leveled=cand.filter(m=>isFinite(Number(m.level))).sort((a,b)=>Number(a.level)-Number(b.level));
  if(!leveled.length) return null;
  const below=leveled.filter(m=>Number(m.level)<=lv);
  return below.length ? below[below.length-1] : leveled[0];
}
function verdict(d){ if(d>=0) return {key:'vPass',cls:'v-pass'}; if(d>-BIG_MISS_PER_HOUR) return {key:'vUnder',cls:'v-under'}; return {key:'vBig',cls:'v-big'}; }
const f2=n=>(Number(n)||0).toFixed(2);
const sgn=n=>{const x=Number(n)||0; return (x>=0?'+':'')+x.toFixed(2);};

function compute(clients, reports, staff){
  const byBooster={};
  const isTestMap=r=>String(r.map||'').toUpperCase()==='TEST';
  // 정산 집계: 체크아웃 + 현황(1시간 리포트). 체크인은 근무창(시급 계산)용. 기타·테스트 맵 제외.
  reports.filter(r=>(r.tag==='status'||r.tag==='checkout'||!r.tag) && !isTestMap(r)).forEach(r=>(byBooster[r.booster]=byBooster[r.booster]||[]).push(r));

  const results = Object.keys(byBooster).map(booster=>{
    const sm=staffByName(staff,booster); const rate=sm?(Number(sm.rate)||0):0; const protectedUntil=sm?sm.protectedUntil:null;
    const brk=breaksFor(workHoursOf(sm));        // 근무시간별 쉬는시간
    const sessions=byBooster[booster].slice().sort((a,b)=>(a.date+a.tag).localeCompare(b.date+b.tag));

    const sessionRows=sessions.map(r=>{
      const mo=findMap(clients,r); const target=mo?Number(mo.target):null; const h=(r.tag==='status')?1:sessionHours(r, brk);
      const cl=clients.find(x=>x.name===r.client); const clientNo=cl?cl.no:'';
      const adj=r.adj||null; const isRest=adj&&adj.mode==='rest'; const isManual=adj&&adj.mode==='manual';
      const effGain=(isManual&&target!=null)?(adj.pct/100)*target*h:gainedPct(r);
      const actualPerH=isRest?null:effGain/h; const diff=(isRest||target==null)?null:actualPerH-target;
      const vd=isRest?{key:'vRest',cls:'v-skip'}:(target==null?{key:'vNoStd',cls:'v-skip'}:verdict(diff));
      return { id:r.id, wrote:writtenShort(r), wroteMs:reportMs(r), date:r.date, tag:r.tag, client:r.client, clientNo, pc:r.pc, lv:r.lvAfter, mapObj:mo, rawMap:r.map, hours:h, dead:r.dead||0,
        actualPerH, target, diff, isRest, isManual, protected:isProtectedUntil(protectedUntil,r.date),
        verdict: vd };
    });

    const byDate={};
    sessions.forEach(r=>(byDate[r.date]=byDate[r.date]||[]).push(r));
    let weekGain=0, weekQuota=0, anyCounted=false, totalHours=0;
    const dayRows=Object.keys(byDate).sort().map(date=>{
      const rs=byDate[date]; let gain=0,quota=0,hours=0,dead=0,hasStd=true;
      rs.forEach(r=>{ const mo=findMap(clients,r); const h=(r.tag==='status')?1:sessionHours(r, brk); const tg=mo?Number(mo.target):null;
        const adj=r.adj||null;
        if(adj && adj.mode==='rest'){ return; }    // 휴식: 성과·시간 집계 제외 (기본급은 일급에 포함)
        const g=(adj && adj.mode==='manual' && tg!=null)?(adj.pct/100)*tg*h:gainedPct(r);
        gain+=g; hours+=h; dead+=r.dead||0; if(mo)quota+=tg*h; else hasStd=false; });
      const prot=isProtectedUntil(protectedUntil,date); const counted=!prot&&hasStd&&quota>0;
      const actualPerH=hours?gain/hours:0; const targetPerH=hours?quota/hours:0;
      const diff=hasStd?actualPerH-targetPerH:null; const dayPct=quota>0?gain/quota*100:null;
      const payPct = counted ? dayPct : 100;          // 보호/기준없음 = 기본급(100%)
      totalHours+=hours;
      if(counted){ weekGain+=gain; weekQuota+=quota; anyCounted=true; }
      return { date, hours, dead, gain, quota, actualPerH, targetPerH, diff, dayPct, payPct, basePay:0, actualPay:0, protected:prot, noStd:!hasStd, counted,
        verdict:!hasStd?{key:'vNoStd',cls:'v-skip'}:prot?{key:'vProtected',cls:'v-skip'}:verdict(diff) };
    });

    // 일급 = 월급(rate) ÷ 30. 근무한 하루마다 일급을 기준으로
    //  · 스탠다드 초과 → 일급의 + (인센티브)
    //  · 스탠다드 미달 → 일급의 - (차감)
    const monthBase = rate;
    // 리더 여부 + 수당 (리더도 본인 일급+스탠다드로 정산, 수당은 월급에 합산)
    const _sr = staff.find(x=>x.name===booster) || {};
    const allowance = Number(_sr.allowance)||0;
    const isLeader = allowance>0;
    const teamMembers = isLeader ? staff.filter(x=>x.leader===booster).map(m=>m.name) : [];
    let weekActualPay=0, weekBasePay=0, incentiveTotal=0, penaltyTotal=0;
    dayRows.forEach(d=>{
      d.basePay = (monthBase + allowance)/30;     // 일급 = 월급(+리더 수당) ÷ 30 — 리더도 전체 월급을 일급으로 치환
      const ratio = Math.min(MONTH_MAX/100, Math.max(MONTH_MIN/100, d.payPct/100));  // -70%~+200% 클램프
      d.incentive = d.counted ? d.basePay*Math.max(0, ratio-1) : 0;
      d.penalty   = d.counted ? d.basePay*Math.max(0, 1-ratio) : 0;
      d.actualPay = d.basePay + d.incentive - d.penalty;
      weekBasePay += d.basePay; weekActualPay += d.actualPay;
      incentiveTotal += d.incentive; penaltyTotal += d.penalty;
    });

    const weekPct=(anyCounted&&weekQuota>0)?weekGain/weekQuota*100:null;
    // 표시 기준 = 전체 월급(+리더 수당). 일급 단위 ± 가감을 월급에 반영. 70~200% 클램프.
    const monthBasePay = monthBase + allowance;
    // 시급 = 일급 ÷ 하루 근무시간 (체크인 PLAY TIME 창 평균). 일급 = 월급 ÷ 30.
    const myCheckins = reports.filter(r=>r.booster===booster && r.tag==='checkin' && !isTestMap(r));
    const shiftHours = myCheckins.length ? (myCheckins.reduce((s,r)=>s+sessionHours(r, brk),0)/myCheckins.length) : 12;
    const dailyBase = monthBasePay/30;
    const hourlyBase = shiftHours>0 ? dailyBase/shiftHours : dailyBase/12;
    const monthRaw = monthBase + allowance + incentiveTotal - penaltyTotal;
    const monthClampedPay=Math.min(monthBasePay*MONTH_MAX/100, Math.max(monthBasePay*MONTH_MIN/100, monthRaw));
    const monthClampedPct=monthBasePay>0?Math.min(MONTH_MAX,Math.max(MONTH_MIN, monthRaw/monthBasePay*100)):null;
    const latestDay=dayRows.length?dayRows[dayRows.length-1]:null;

    return { booster, baseRate:rate, sessionRows, dayRows, weekPct, weekGain, weekQuota,
      weekActualPay, weekBasePay, monthClampedPay, monthBasePay, monthClampedPct, latestDay,
      incentiveTotal, penaltyTotal, isLeader, allowance, teamMembers, teamSize:teamMembers.length,
      dailyBase, hourlyBase, shiftHours };
  });

  // 리포트가 아직 없는 일반 직원 = 기록 대기. (팀장은 아래 팀-정산 패스에서 일괄 처리)
  staff.forEach(s=>{
    if(byBooster[s.name]) return;                 // 본인이 사냥 리포트가 있으면 위에서 처리됨
    if(Number(s.allowance)>0) return;             // 팀장은 아래에서 팀 성과로 정산
    const base = Number(s.rate)||0;
    results.push({ booster:s.name, baseRate:base, sessionRows:[], dayRows:[],
      weekPct:null, weekGain:0, weekQuota:0, weekActualPay:0, weekBasePay:0,
      monthClampedPay:0, monthBasePay:0, monthClampedPct:null, latestDay:null,
      incentiveTotal:0, penaltyTotal:0, noData:true });
  });

  // ── 팀장 정산: 본인 플레이가 아니라 "팀원들의 성과"를 일급 방식으로 월급에 반영 ──
  //  · 팀원이 그날 기준 초과 → 리더 일급 +, 미달 → 리더 일급 −  (팀 평균 성과% 기준)
  //  · 리더 일급 = (월급 + 리더수당) ÷ 30.  월 누적 = 월급+수당 ± Σ일급가감 (70~200% 클램프)
  staff.filter(s=>Number(s.allowance)>0).forEach(ls=>{
    const rate = Number(ls.rate)||0, allowance = Number(ls.allowance)||0;
    const teamMembers = staff.filter(x=>x.leader===ls.name).map(m=>m.name);
    const memberResults = results.filter(p=>teamMembers.includes(p.booster));
    // 팀원들의 일자별 성과%(채점된 날만) 수집 → 그날 팀 평균
    const dayMap = {};
    memberResults.forEach(p=>(p.dayRows||[]).forEach(d=>{ if(d.counted && d.dayPct!=null){ (dayMap[d.date]=dayMap[d.date]||[]).push(d.dayPct); } }));
    const dailyBase = (rate + allowance)/30;       // 리더 일급 (월급+수당)
    let incentiveTotal=0, penaltyTotal=0;
    const dayRows = Object.keys(dayMap).sort().map(date=>{
      const avgPct = dayMap[date].reduce((a,b)=>a+b,0)/dayMap[date].length;
      const ratio = Math.min(MONTH_MAX/100, Math.max(MONTH_MIN/100, avgPct/100));  // -70%~+200% 클램프
      const incentive = dailyBase*Math.max(0, ratio-1), penalty = dailyBase*Math.max(0, 1-ratio);
      incentiveTotal += incentive; penaltyTotal += penalty;
      return { date, dayPct:avgPct, payPct:avgPct, counted:true, hours:0, dead:0, gain:0, quota:0, diff:null,
        basePay:dailyBase, incentive, penalty, actualPay:dailyBase+incentive-penalty, protected:false, noStd:false,
        verdict: avgPct>=100?{key:'vPass',cls:'v-pass'}:verdict((avgPct-100)/100) };
    });
    const allPcts = Object.values(dayMap).reduce((a,b)=>a.concat(b),[]);
    const teamAvg = allPcts.length ? allPcts.reduce((a,b)=>a+b,0)/allPcts.length : null;
    const teamReported = memberResults.filter(p=>p.weekPct!=null).length;
    const monthBasePay = rate + allowance;
    const _lc = reports.filter(r=>r.booster===ls.name && r.tag==='checkin');
    const shiftHours = _lc.length ? (_lc.reduce((s,r)=>s+sessionHours(r, breaksFor(workHoursOf(ls))),0)/_lc.length) : 12;
    const hourlyBase = shiftHours>0 ? dailyBase/shiftHours : dailyBase/12;
    const monthRaw = monthBasePay + incentiveTotal - penaltyTotal;
    const monthClampedPay = Math.min(monthBasePay*MONTH_MAX/100, Math.max(monthBasePay*MONTH_MIN/100, monthRaw));
    const monthClampedPct = monthBasePay>0 ? Math.min(MONTH_MAX, Math.max(MONTH_MIN, monthRaw/monthBasePay*100)) : null;
    const latestDay = dayRows.length?dayRows[dayRows.length-1]:null;
    const leaderResult = { booster:ls.name, baseRate:rate, sessionRows:[], dayRows,
      weekPct:teamAvg, weekGain:0, weekQuota:0, weekActualPay:monthRaw, weekBasePay:monthBasePay,
      monthClampedPay, monthBasePay, monthClampedPct, latestDay,
      incentiveTotal, penaltyTotal, isLeader:true, allowance, teamSize:teamMembers.length, teamMembers,
      teamAvg, teamReported, dailyBase, hourlyBase, shiftHours };
    const idx = results.findIndex(p=>p.booster===ls.name);
    if(idx>=0) results[idx]=leaderResult; else results.push(leaderResult);
  });
  return results;
}

function periodPay(p){ return period==='day'?(p.latestDay?p.latestDay.actualPay:0) : period==='month'?p.monthClampedPay : p.weekActualPay; }
function periodPct(p){
  if(period==='day') return p.latestDay?(p.latestDay.counted?p.latestDay.dayPct:null):null;
  if(period==='month') return p.monthClampedPct;
  return p.weekPct;
}
function periodStats(p){
  if(period==='day'){
    const d=p.latestDay; if(!d) return null;
    return { label:t('pDay')+' ('+d.date.slice(5)+')', targetExp:d.quota, actualExp:d.gain,
      pct:d.counted?d.dayPct:null, protected:d.protected, noStd:d.noStd, basePay:d.basePay, actualPay:d.actualPay, clamped:false };
  }
  if(period==='month'){
    return { label:t('pMonth'), targetExp:p.weekQuota, actualExp:p.weekGain,
      pct:p.weekPct==null?null:p.monthClampedPct, protected:false, noStd:false, basePay:p.monthBasePay, actualPay:p.monthClampedPay, clamped:true };
  }
  return { label:t('pWeek'), targetExp:p.weekQuota, actualExp:p.weekGain,
    pct:p.weekPct, protected:false, noStd:false, basePay:p.weekBasePay, actualPay:p.weekActualPay, clamped:false };
}
function calcBreakdown(p){
  const s=periodStats(p); if(!s) return '';
  if(s.pct==null){
    return `<div class="calc-box">
      <div class="calc-title">📊 ${t('calcHow')} · ${s.label}</div>

      <div class="calc-flow"><span class="calc-eq">${t('cResult')}</span> <b>${money(s.actualPay)}</b></div>
    </div>`;
  }
  const max=Math.max(s.targetExp,s.actualExp)||1;
  const tW=Math.max(3,s.targetExp/max*100), aW=Math.max(3,s.actualExp/max*100);
  const aColor=s.actualExp>=s.targetExp?'var(--success)':'var(--danger)';
  const pctCls=s.pct>=100?'pos':'neg';
  const verdictMsg=s.pct>=100?t('cOver'):t('cUnder');

function empDetailHtml(p){
  if(p.isLeader) return leaderDetailHtml(p);
  const monthly  = p.baseRate;            // 월 기본급 (고정)
  const incentive= p.incentiveTotal||0;   // 모인 인센티브 (주 지급)
  const penalty  = p.penaltyTotal||0;     // 월말 차감
  const net      = p.monthClampedPay;      // 예상 실수령 (월)
  const pct      = p.monthClampedPct;
  const down=penalty>incentive+0.5, up=incentive>penalty+0.5;
  const deltaCls=down?'neg':(up?'pos':'neu');
  const gPos=pct==null?100:Math.min(MONTH_MAX,Math.max(MONTH_MIN,pct));
  const gPct=(gPos-MONTH_MIN)/(MONTH_MAX-MONTH_MIN)*100;
  const g100=(100-MONTH_MIN)/(MONTH_MAX-MONTH_MIN)*100;

  const dayList=p.dayRows.map(d=>{
    const over=d.counted&&d.incentive>0, under=d.counted&&d.penalty>0;
    const dpCls=!d.counted?'neu':(over?'pos':(under?'neg':'neu'));
    const arr=!d.counted?'·':(over?'▲':(under?'▼':'·'));
    const stripC=!d.counted?'var(--tx3)':(over?'var(--gr)':(under?'var(--re)':'var(--tx3)'));
    const perfTxt=d.counted?(d.dayPct.toFixed(0)+'%'):(d.protected?t('uProtectedDay'):t('uNoStdDay'));
    const perfCls=!d.counted?'neu':(d.dayPct>=100?'pos':'neg');
    const deadTxt=d.dead?` <span class="ud-dead">·☠${d.dead}</span>`:'';
    const amt=!d.counted?'·':(over?money(d.incentive):(under?money(d.penalty):money(0)));
    return `<div class="ud-row" style="--c:${stripC};">
      <span class="ud-date">${d.date.slice(5)}</span>
      <span class="ud-perf ${perfCls}">${perfTxt}</span>
      <span class="ud-calc">${t('uBase')} ${money(d.basePay)}${deadTxt}</span>
      <span class="ud-delta ${dpCls}">${arr} ${amt}</span>
    </div>`;
  }).join('');

  return `
    <div class="udash">
      <div class="ud-net-row ${deltaCls}">
        <span class="ud-net-l">${t('uNet')}</span>
        <span class="ud-net-v">${money(net)} <span class="ud-net-pct">${pct==null?'—':pct.toFixed(0)+'%'}</span></span>
      </div>
      <div class="ud-gauge">
        <div class="ud-gauge-track">
          <div class="ud-gauge-fill ${deltaCls}" style="width:${gPct}%;"></div>
          <div class="ud-gauge-100" style="left:${g100}%;"></div>
          <div class="ud-gauge-mark ${deltaCls}" style="left:${gPct}%;"></div>
        </div>
        <div class="ud-gauge-scale"><span>${MONTH_MIN}%</span><span style="margin-left:auto;margin-right:auto;">100%</span><span>${MONTH_MAX}%</span></div>
      </div>

    </div>`;
}

// .time-input(id)의 .value = "HH:MM"(24h) → 기존 읽기 그대로 호환
function timeToggleHtml(id, def, cb){
  def = def || '00:00';
  const cbCall = cb ? `;${cb}()` : '';
  return `<div class="time-block">
    <input type="text" class="time-input" id="${id}" value="${def}" inputmode="numeric" maxlength="5" autocomplete="off" placeholder="HH:MM" oninput="tpFmt(this)${cbCall}" onblur="tpNorm(this)${cbCall}" onfocus="this.select()">
    <div class="time-steppers">
      <button type="button" class="step-btn" onclick="tpStep('${id}',-60)${cbCall}">−1H</button>
      <button type="button" class="step-btn" onclick="tpStep('${id}',-30)${cbCall}">−30</button>
      <button type="button" class="step-btn" onclick="tpStep('${id}',30)${cbCall}">+30</button>
      <button type="button" class="step-btn" onclick="tpStep('${id}',60)${cbCall}">+1H</button>
    </div>
  </div>`;
}
// 입력 중 자동 포맷: "9"→"9", "930"→"9:30", "0930"→"09:30"
function tpFmt(el){
  const raw=(el.value||'').replace(/[^\d]/g,'').slice(0,4);
  let f=raw;
  if(raw.length===3) f=raw[0]+':'+raw.slice(1);
  else if(raw.length===4) f=raw.slice(0,2)+':'+raw.slice(2);
  el.value=f;
  const m=f.match(/^(\d{1,2}):(\d{2})$/);
  el.classList.toggle('invalid', !!(m && (Number(m[1])>23||Number(m[2])>59)));
}
// 포커스 빠질 때 정규화: "9:0"→"09:00", 범위 보정
function tpNorm(el){
  const v=(el.value||'').trim();
  if(!v){ el.value='00:00'; el.classList.remove('invalid'); return; }
  const m=v.match(/^(\d{1,2}):?(\d{0,2})$/);
  if(!m){ el.value='00:00'; el.classList.remove('invalid'); return; }
  const h=Math.min(23,Math.max(0,parseInt(m[1],10)||0));
  const mi=Math.min(59,Math.max(0,parseInt(m[2]||'0',10)||0));
  el.value=String(h).padStart(2,'0')+':'+String(mi).padStart(2,'0');
  el.classList.remove('invalid');
}
// 스텝 버튼 (±분, 자정 넘김 처리)
function tpStep(id, mins){
  const el=document.getElementById(id); if(!el) return;
  const m=(el.value||'').match(/^(\d{1,2}):?(\d{0,2})$/);
  const h=m?(parseInt(m[1],10)||0):0, mi=m?(parseInt(m[2]||'0',10)||0):0;
  const total=((h*60+mi)+mins+1440)%1440;
  el.value=String(Math.floor(total/60)).padStart(2,'0')+':'+String(total%60).padStart(2,'0');
  el.classList.remove('invalid');
}

function updateReportPreview(){

  const end=document.getElementById('rp-end')?.value||'';
  if(!c){ el.innerHTML=''; return; }
  if(map==='TEST'){ el.innerHTML=`<span class="rep-pv-txt" style="color:var(--ye);">🧪 ${t('mapTestNote')}</span>`; return; }
  const ci=latestCheckin(booster,c.name,date);
  const startLv=(rpDraft.prevLv!=null)?rpDraft.prevLv:(ci?Number(ci.lvBefore):0);
  const startExp=(rpDraft.prevExp!=null)?rpDraft.prevExp:(ci?Number(ci.expBefore):0);
  const start=rpDraft.prevStart||(ci?ci.start:'21:00');
  const levelUp=(endExp<startExp)?1:0;            // 레벨칸 제거 → 종료 EXP<시작 EXP면 레벨업 1회 자동 반영
  const lv=startLv+levelUp;

  const hrs=sessionHours({start,end});
  const src=ci?t('rpFromCheckin'):t('rpNoCheckin');
  if(!gained||!hrs){ el.innerHTML=`<span class="rep-pv-txt muted">${src}</span>`; return; }
  const mm=findMap(MOCK_CLIENTS,{client:c.name,pc:c.pc,map,lvAfter:lv||startLv});
  const perH=gained/hrs;
  if(!mm||!mm.target){ el.innerHTML=`<span class="rep-pv-txt muted">+${gained.toFixed(2)}% · ${perH.toFixed(2)}%/h · ${t('uNoStdDay')} <span class="rep-pv-src">(${src})</span></span>`; return; }
  const pct=perH/mm.target*100, cls=pct>=100?'pos':'neg';

}

async function loadPrevForReport(){
  rpDraft.prevExp=null; rpDraft.prevAdena=null; rpDraft.prevLv=null; rpDraft.prevStart=null;
  if(reportType!=='status'&&reportType!=='checkout') return;
  const c=MOCK_CLIENTS.find(x=>x.id===rpDraft.clientId); if(!c||c.no==null||c.no==='') return;
  const kind = reportType==='checkout' ? 'checkin' : 'last';
  const apply=(s)=>{ if(s){ rpDraft.prevExp=s.exp; rpDraft.prevAdena=s.adena; rpDraft.prevLv=s.level; rpDraft.prevStart=s.start; } };
  let src = getLocalPrev(c.no, kind);
  apply(src); // 로컬 저장값 즉시 적용 (서버 응답 전에도 사용)
  try{
    const tp=reportType==='checkout'?'?type=CHECKIN':'';
    const res=await fetch(`/api/last-session-by-no/${encodeURIComponent(c.no)}${tp}`);
    const j=await res.json(); const s=j&&j.session;
    if(s){
      const serverTs = s.logged_at ? new Date(s.logged_at).getTime() : 0;
      if(!src || serverTs > (src.ts||0)){
        src = { exp:Number(s.exp_after)||0, adena:Number(s.adena_after)||0, level:(s.level!=null?Number(s.level):null), start:s.play_time_start||null, ts:serverTs };
        apply(src);
      }
    }
  }catch(e){}
  updateReportPreview();
  rpGainPv();
}

      <span class="rep-r-date">${dualTimeHtml(r)}</span>
      <span class="rep-r-who">${esc(r.booster)}</span>
      <span class="rep-r-mid muted">PC${r.pc} · ${esc(r.map||'-')}</span>
      ${right}
      <button class="rep-r-del" onclick="deleteReport('${esc(r.id)}')" title="${t('rpDelOk')}">×</button>
    </div>`;
  }).join('');
}
async function deleteReport(id){ if(!roleCan('editRecords')) return; await removeReport(id); await renderDashboard(); renderReportList(); showToast(t('rpDelOk')); }
async function deleteRecordReport(id){
  if(!roleCan('editRecords')) return;
  if(!confirm(t('recDelConfirm'))) return;
  await removeReport(id);
  if(typeof renderDashboard==='function') await renderDashboard();
  showToast(t('rpDelOk'));
}
let _toastT=null;
function showToast(msg){ const el=document.getElementById('toast'); if(!el) return; el.textContent=msg; el.classList.add('show'); clearTimeout(_toastT); _toastT=setTimeout(()=>el.classList.remove('show'),2200); }

/* ============================================================
   직원 급여 입력 화면
   ============================================================ */
async function renderStaff(){
  const staff=await loadStaff();
  const host=document.getElementById('staff-list'); if(!host) return;
  const head=`<div class="staff-head"><span>${t('thName')}</span><span class="h-rate">${t('rateLabel')} (${CURRENCY.trim()})</span><span>${t('startLabel')}</span><span></span></div>`;
  host.innerHTML=`<div class="staff-table">${head}${staff.map(staffLine).join('')}<div class="staff-add" onclick="addStaff()">${t('addStaff')}</div></div>`;
}
function staffLine(s){
  const lead=Number(s.allowance)>0;
  const wh=workHoursOf(s);
  const whOpts=[8,10,12].map(n=>`<option value="${n}"${wh===n?' selected':''}>${n}${t('hUnit')}</option>`).join('');
  return `<div class="staff-line${lead?' staff-leader':''}">
    <div class="s-name-cell">
      <div class="s-name-row">${lead?'<span class="staff-crown" title="'+t('roleLeader')+'">👑</span>':''}<input class="input s-name" value="${esc(s.name)}" onchange="updateStaff('${s.id}','name',this.value)" placeholder="${t('thName')}"><select class="s-shift-sel" onchange="updateStaff('${s.id}','workHours',this.value)" title="${t('workHoursLabel')}">${whOpts}</select></div>
      ${lead?`<span class="s-allow">+ ${t('ldAllowance')} ${money(s.allowance)} · ${t('gBase')} ${money((Number(s.rate)||0)+Number(s.allowance))}</span>`:''}
    </div>
    <input class="input s-rate" type="number" value="${s.rate}" onchange="updateStaff('${s.id}','rate',this.value)" placeholder="${t('rateLabel')}">
    <input class="input s-date" type="date" value="${esc(s.protectedUntil||'')}" onchange="updateStaff('${s.id}','protectedUntil',this.value)">
    <button class="staff-del" onclick="deleteStaff('${s.id}')" aria-label="remove">×</button>
  </div>`;
}
async function updateStaff(id,field,val){
  const staff=await loadStaff(); const s=staff.find(x=>x.id===id); if(!s) return;
  s[field] = (field==='rate'||field==='workHours') ? (Number(val)||0) : val;
  await saveStaff(s);
  await renderDashboard();   // 월급 바뀌면 급여 다시 계산
}
async function addStaff(){
  await saveStaff({ id:'st_'+Date.now(), name:'', rate:0, start:'' });
  await renderStaff();
}
async function deleteStaff(id){
  if(!confirm(t('delStaffConfirm'))) return;
  await removeStaff(id); await renderStaff(); await renderDashboard();
}

/* ============================================================
   CSV 내보내기
   ============================================================ */
function csvCell(v){ const s=String(v==null?'':v); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }
function download(name,text){
  const blob=new Blob(['\uFEFF'+text],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download=name; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}
function today(){ return new Date().toISOString().slice(0,10).replace(/-/g,''); }
function exportAllCsv(){
  const head=['Staff', t('payHr'), 'Week%', t('payWeek'), t('payMonth')];
  const rows=perfCache.map(p=>[ p.booster, p.baseRate, p.weekPct==null?'-':p.weekPct.toFixed(1), Math.round(p.weekActualPay), Math.round(p.monthClampedPay) ]);
  const csv=[head,...rows].map(r=>r.map(csvCell).join(',')).join('\n');
  download('staff_summary_'+today()+'.csv', csv);
}
function exportEmployeeCsv(booster){
  const p=perfCache.find(x=>x.booster===booster); if(!p) return;
  const head=[t('hDate'),t('hClient'),t('hPc'),t('hLv'),t('hMap'),t('hActualExp'),t('hTarget'),t('hDiff'),t('hResult')];
  const rows=p.sessionRows.map(r=>[
    r.date+(r.tag?('-'+r.tag):''), (r.clientNo?r.clientNo+'. ':'')+r.client, r.pc, r.lv,
    r.mapObj?mapName(r.mapObj):r.rawMap, f2(r.actualPerH), r.target==null?'-':f2(r.target),
    r.diff==null?'-':sgn(r.diff), t(r.verdict.key)
  ]);
  const csv=[head,...rows].map(r=>r.map(csvCell).join(',')).join('\n');
  download(booster+'_'+today()+'.csv', csv);
}

function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function buildDatalists(){
  const ko=document.getElementById('map-ko-list'); const en=document.getElementById('map-en-list');
  if(ko) ko.innerHTML=MAP_PRESETS.map(m=>`<option value="${esc(m.ko)}">`).join('');
  if(en) en.innerHTML=MAP_PRESETS.map(m=>`<option value="${esc(m.en)}">`).join('');
}

document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){ const o=document.getElementById('edit-modal'); if(o && o.classList.contains('open')) cancelEdit(); }
});
function startSyncPolling(){
  setInterval(async ()=>{
    if(editingId) return;                                   // 클라 편집 중 건너뜀
    const ae=document.activeElement;
    if(ae && (ae.tagName==='INPUT'||ae.tagName==='SELECT'||ae.tagName==='TEXTAREA')) return; // 입력 중 건너뜀
    const changed=await syncFromServer();
    if(changed){ await renderStandards(); await renderStaff(); await renderDashboard(); }
  }, 8000);
}
(async function init(){
  try{ const sv=localStorage.getItem('buju_lang'); if(sv==='en'||sv==='ko') lang=sv; }catch(e){}
  try{ const g=localStorage.getItem('buju_game'); if(g) currentGame=g; }catch(e){}
  ['seg-ko','login-seg-ko'].forEach(id=>{ const e=document.getElementById(id); if(e) e.classList.toggle('active', lang==='ko'); });
  ['seg-en','login-seg-en'].forEach(id=>{ const e=document.getElementById(id); if(e) e.classList.toggle('active', lang==='en'); });
  applyStaticText(); buildDatalists(); await syncFromServer(); await renderStandards(); await renderStaff(); await renderDashboard(); renderReport(); startSyncPolling(); })();
</script>
